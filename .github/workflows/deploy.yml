name: Deploy to Hostinger

# Har push (main branch) pe: GitHub runner pe build -> Hostinger pe deploy -> restart
on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-hostinger
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create .env.local (build + runtime env)
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: printf '%s\n' "$ENV_FILE" > .env.local

      - name: Build (standalone)
        run: npm run build

      - name: Assemble standalone bundle
        run: |
          rm -rf deploy
          cp -r .next/standalone deploy
          mkdir -p deploy/.next
          cp -r .next/static deploy/.next/static
          if [ -d public ]; then cp -r public deploy/public; fi
          cp .env.local deploy/.env.local
          tar czf bundle.tgz -C deploy .
          echo "Bundle size:"; du -h bundle.tgz

      - name: Upload bundle & deploy (with retries)
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
          HOSTN: ${{ secrets.SSH_HOST }}
          USERN: ${{ secrets.SSH_USER }}
          PORTN: ${{ secrets.SSH_PORT }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass rsync
          cat > remote.sh <<'EOF'
          set -e
          PARENT="$HOME/domains/bombaycontentcompany.com"
          APP="$PARENT/nodejs"
          STAGE="$PARENT/nodejs-stage"
          # Build the new app in a staging dir first
          rm -rf "$STAGE"; mkdir -p "$STAGE"
          tar xzf "$HOME/bundle.tgz" -C "$STAGE"
          mkdir -p "$STAGE/tmp"
          # Atomic swap: a cancelled/interrupted deploy can never leave a
          # half-written live app dir (that caused ChunkLoadError crashes).
          rm -rf "$PARENT/nodejs-old"
          mv "$APP" "$PARENT/nodejs-old"
          mv "$STAGE" "$APP"
          touch "$APP/tmp/restart.txt"
          rm -rf "$PARENT/nodejs-old" "$HOME/bundle.tgz"
          echo ">> Deployed (atomic swap) and restarted."
          EOF
          SCPO="-P $PORTN -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=60"
          SSHO="-p $PORTN -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=60 -o ServerAliveInterval=15"
          n=0
          while true; do
            n=$((n+1))
            echo "=== Deploy attempt $n ==="
            if sshpass -e scp $SCPO bundle.tgz "$USERN@$HOSTN:bundle.tgz" \
               && sshpass -e ssh $SSHO "$USERN@$HOSTN" 'bash -s' < remote.sh; then
              echo "Deploy succeeded on attempt $n"; break
            fi
            if [ "$n" -ge 3 ]; then echo "Deploy failed after $n attempts"; exit 1; fi
            echo "Attempt $n failed; retrying in 30s..."; sleep 30
          done
