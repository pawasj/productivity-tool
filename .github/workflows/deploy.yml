name: Deploy to Hostinger

# Jab bhi 'main' branch pe push hoga, ye apne aap chalega:
# Hostinger pe SSH karega -> code pull -> install -> build -> app restart
on:
  push:
    branches: [main]
  workflow_dispatch: {} # GitHub se manually bhi chala sakte ho (Actions tab -> Run workflow)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: "20m"
          script: |
            set -e
            cd ${{ secrets.APP_PATH }}
            echo ">> Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main
            echo ">> Installing dependencies..."
            npm install
            echo ">> Building Next.js..."
            npm run build
            echo ">> Restarting app (Passenger)..."
            mkdir -p tmp
            touch tmp/restart.txt
            echo ">> Done. Live!"
