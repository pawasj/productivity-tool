name: Deploy to Hostinger

# Har push (main branch) pe: GitHub runner pe build -> Hostinger pe deploy -> restart
on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-hostinger
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create .env.local (build + runtime env)
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: printf '%s\n' "$ENV_FILE" > .env.local

      - name: Build (standalone)
        run: npm run build

      - name: Assemble standalone bundle
        run: |
          rm -rf deploy
          cp -r .next/standalone deploy
          mkdir -p deploy/.next
          cp -r .next/static deploy/.next/static
          if [ -d public ]; then cp -r public deploy/public; fi
          cp .env.local deploy/.env.local
          tar czf bundle.tgz -C deploy .
          echo "Bundle size:"; du -h bundle.tgz

      - name: Upload bundle & deploy (with retries)
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
          HOSTN: ${{ secrets.SSH_HOST }}
          USERN: ${{ secrets.SSH_USER }}
          PORTN: ${{ secrets.SSH_PORT }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass rsync
          cat > remote.sh <<'EOF'
          set -e
          APP="$HOME/domains/bombaycontentcompany.com/nodejs"
          rm -rf "$HOME/bundle-new"; mkdir -p "$HOME/bundle-new"
          tar xzf "$HOME/bundle.tgz" -C "$HOME/bundle-new"
          # Replace app files, but keep Passenger's tmp/ and log files
          rsync -a --delete \
            --exclude 'tmp' --exclude 'console.log' --exclude 'stderr.log' \
            "$HOME/bundle-new/" "$APP/"
          mkdir -p "$APP/tmp"; touch "$APP/tmp/restart.txt"
          rm -rf "$HOME/bundle-new" "$HOME/bundle.tgz"
          echo ">> Deployed and restarted."
          EOF
          SCPO="-P $PORTN -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=60"
          SSHO="-p $PORTN -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=60 -o ServerAliveInterval=15"
          n=0
          while true; do
            n=$((n+1))
            echo "=== Deploy attempt $n ==="
            if sshpass -e scp $SCPO bundle.tgz "$USERN@$HOSTN:bundle.tgz" \
               && sshpass -e ssh $SSHO "$USERN@$HOSTN" 'bash -s' < remote.sh; then
              echo "Deploy succeeded on attempt $n"; break
            fi
            if [ "$n" -ge 6 ]; then echo "Deploy failed after $n attempts"; exit 1; fi
            echo "Attempt $n failed; retrying in 60s..."; sleep 60
          done

      # If the deploy still failed (e.g. Hostinger SSH was unreachable for a
      # while), automatically re-run the whole workflow — a fresh run gets a new
      # runner IP and a later time when Hostinger SSH is usually back. Capped at
      # 3 attempts so it can never loop forever.
      - name: Auto re-run on failure
        if: ${{ failure() && fromJSON(github.run_attempt) < 3 }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Deploy failed on attempt ${{ github.run_attempt }} — re-running workflow..."
          sleep 30
          gh run rerun ${{ github.run_id }} --failed
