name: Diagnose Hostinger

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: SSH diagnostics
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
          HOSTN: ${{ secrets.SSH_HOST }}
          USERN: ${{ secrets.SSH_USER }}
          PORTN: ${{ secrets.SSH_PORT }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass
          echo "=== EXTERNAL 443 from runner ==="
          curl -s -m 15 -o /dev/null -w "  https://bombaycontentcompany.com/login -> %{http_code} (%{time_total}s)\n" https://bombaycontentcompany.com/login 2>&1 || echo "  external 443 UNREACHABLE from runner"
          echo "=== which GOOGLE_CLIENT_ID is the live app using? ==="
          curl -s -m 15 -o /dev/null -w "%{redirect_url}\n" https://bombaycontentcompany.com/api/auth/google-calendar 2>&1 | grep -oE 'client_id=[0-9]+' || echo "  (no redirect captured)"
          SSHO="-p $PORTN -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=60"
          sshpass -e ssh $SSHO "$USERN@$HOSTN" 'bash -s' <<'EOF'
          D="$HOME/domains/bombaycontentcompany.com"
          echo "=== LOCAL 443 via Passenger vhost ==="
          curl -sk -m 20 -o /tmp/out.html -w "  https://127.0.0.1/login -> %{http_code} (%{time_total}s)\n" -H "Host: bombaycontentcompany.com" https://127.0.0.1/login 2>&1 || echo "  local 443 FAILED"
          echo "  --- response head ---"; head -c 400 /tmp/out.html 2>/dev/null; echo
          echo "=== lucide ssr chunk present? ==="
          ls "$D/nodejs/.next/server/chunks/ssr/" 2>/dev/null | grep -i lucide | head
          echo "  total ssr chunks:"; ls "$D/nodejs/.next/server/chunks/ssr/" 2>/dev/null | wc -l
          echo "=== uptime / load ==="; uptime
          echo "=== disk ==="; df -h ~ | tail -2
          echo "=== quota ==="; quota -s 2>/dev/null | tail -4 || echo "(no quota cmd)"
          D="$HOME/domains/bombaycontentcompany.com"
          echo "=== public_html ==="; ls -la "$D/public_html" | head
          echo "=== .htaccess ==="; cat "$D/public_html/.htaccess" 2>/dev/null || echo "(no .htaccess!)"
          echo "=== nodejs dir ==="; ls -la "$D/nodejs" | head -20
          echo "=== stderr.log (app errors) ==="; tail -40 "$D/nodejs/stderr.log" 2>/dev/null
          echo "=== console.log ==="; tail -20 "$D/nodejs/console.log" 2>/dev/null
          echo "=== node processes ==="; ps aux | grep -i node | grep -v grep | head
          echo "=== LOCAL http test (LiteSpeed on the box) ==="
          curl -s -m 12 -o /dev/null -w "  localhost:80 Host=domain -> %{http_code} (time %{time_total}s)\n" -H "Host: bombaycontentcompany.com" http://127.0.0.1/login 2>&1 || echo "  local curl FAILED"
          echo "=== suspension / limit markers ==="; ls -la "$D" | grep -iE "suspend|disabled" || echo "  none"
          echo "=== restart app ==="; mkdir -p "$D/nodejs/tmp"; touch "$D/nodejs/tmp/restart.txt"; echo "  restarted"
          EOF
